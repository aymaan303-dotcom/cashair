<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كاشير السوبر ماركت</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap');
  :root{
    --bg:#FAF7F0; --surface:#FFFFFF; --primary:#1B4332; --primary-light:#2D6A4F;
    --accent:#E8A33D; --text:#23231F; --muted:#6B6558; --danger:#C1440E; --border:#E4DDD0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;min-height:100vh;}
  button{font-family:inherit;cursor:pointer;}
  button:disabled{cursor:not-allowed;opacity:.5;}
  input,select{font-family:inherit;}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d8d0bf;border-radius:4px;}

  #app{min-height:100vh;display:flex;flex-direction:column;}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--primary);flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon{width:36px;height:36px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#3a2600;}
  .brand-title{color:#fff;font-family:'Tajawal',sans-serif;font-weight:700;font-size:16px;}
  .brand-sub{color:#c9d6cd;font-size:11.5px;}
  .conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-inline-start:6px;}
  .conn-dot.on{background:#7ee0a6;}
  .conn-dot.off{background:#e08b7e;}
  nav{display:flex;gap:6px;background:rgba(255,255,255,.1);padding:4px;border-radius:10px;flex-wrap:wrap;}
  .nav-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;background:transparent;color:#e7ede9;font-size:13.5px;font-weight:500;}
  .nav-btn.active{background:#fff;color:var(--primary);font-weight:700;}

  .cashier-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;padding:16px;flex:1;align-items:start;}
  @media (max-width:820px){.cashier-grid{grid-template-columns:1fr;}}
  .product-pane{display:flex;flex-direction:column;gap:12px;min-width:0;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
  .search-box input{border:none;outline:none;flex:1;background:transparent;font-size:14px;color:var(--text);}
  .cam-btn{border:none;background:var(--primary);color:#fff;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex:none;}
  .cat-row{display:flex;gap:8px;flex-wrap:wrap;}
  .cat-chip{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12.5px;}
  .cat-chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .product-card{text-align:right;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;}
  .product-card:disabled{opacity:.45;}
  .product-name{font-size:13.5px;font-weight:600;line-height:1.4;min-height:36px;}
  .product-meta{display:flex;justify-content:space-between;align-items:center;}
  .product-price{color:var(--primary);font-weight:700;font-size:13.5px;font-family:'Tajawal',sans-serif;}
  .stock-badge{font-size:10.5px;background:#eef3ee;color:var(--primary-light);padding:3px 7px;border-radius:6px;font-weight:600;}
  .stock-badge.low{background:#fdecdf;color:var(--danger);}
  .empty-state{grid-column:1/-1;text-align:center;color:var(--muted);padding:30px;font-size:13.5px;}

  .cart-pane{background:var(--surface);border-radius:14px;overflow:hidden;position:sticky;top:16px;box-shadow:0 4px 20px rgba(27,67,50,.08);}
  .receipt-edge-top{height:12px;background-image:linear-gradient(135deg,var(--bg) 25%,transparent 25%),linear-gradient(225deg,var(--bg) 25%,transparent 25%);background-color:var(--primary);background-size:14px 14px;}
  .cart-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:15px;}
  .clear-btn{display:flex;align-items:center;gap:4px;border:none;background:none;color:var(--danger);font-size:12px;}
  .cart-items{max-height:300px;overflow-y:auto;padding:0 12px;display:flex;flex-direction:column;gap:8px;}
  .cart-empty{color:var(--muted);font-size:12.5px;text-align:center;padding:20px 0;}
  .cart-item{display:flex;align-items:center;gap:8px;border-bottom:1px dashed var(--border);padding-bottom:8px;}
  .cart-item-name{font-size:12.5px;font-weight:600;}
  .cart-item-price{font-size:11px;color:var(--muted);margin-top:2px;}
  .qty-controls{display:flex;align-items:center;gap:4px;}
  .qty-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;}
  .qty-val{min-width:16px;text-align:center;font-size:12.5px;font-weight:600;}
  .remove-btn{border:none;background:none;color:var(--muted);}
  .cart-footer{padding:14px;border-top:1px solid var(--border);margin-top:8px;}
  .total-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:6px;}
  .grand-total{font-size:17px;font-weight:800;color:var(--primary);font-family:'Tajawal',sans-serif;margin-top:6px;}
  .checkout-btn{width:100%;margin-top:10px;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#3a2600;font-weight:700;font-size:14.5px;font-family:'Tajawal',sans-serif;}

  .page-wrap{padding:20px;display:flex;flex-direction:column;gap:14px;}
  .page-header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .page-title{font-family:'Tajawal',sans-serif;font-size:18px;font-weight:700;margin:0;}
  .btn{border:none;border-radius:9px;font-weight:700;font-family:'Tajawal',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn.primary{background:var(--primary);color:#fff;padding:12px;font-size:14.5px;width:100%;margin-top:14px;}
  .btn.primary.small{padding:8px 14px;font-size:13px;width:auto;margin-top:0;}
  .btn.danger{background:var(--danger);}
  .btn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:12px;font-size:14px;}
  .table-wrap{background:var(--surface);border-radius:12px;overflow:auto;border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:right;padding:10px 12px;background:#F1EDE2;color:var(--muted);font-size:11.5px;font-weight:700;border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .icon-btn{border:1px solid var(--border);background:var(--bg);border-radius:7px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;color:var(--text);}
  .reset-link{display:flex;align-items:center;gap:6px;align-self:flex-start;border:none;background:none;color:var(--muted);font-size:12px;text-decoration:underline;}
  .badge{font-size:10.5px;padding:3px 8px;border-radius:6px;font-weight:700;}
  .badge.cash{background:#eef3ee;color:var(--primary-light);}
  .badge.credit{background:#fdf1de;color:#96660f;}
  .badge.paid{background:#eef3ee;color:var(--primary-light);}
  .badge.unpaid{background:#fdecdf;color:var(--danger);}
  .badge.partial{background:#fdf1de;color:#96660f;}

  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stat-label{font-size:11.5px;color:var(--muted);margin-bottom:6px;}
  .stat-value{font-size:20px;font-weight:800;color:var(--primary);font-family:'Tajawal',sans-serif;}
  .sales-list,.credit-list{display:flex;flex-direction:column;gap:8px;}
  .sale-card,.customer-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .sale-card-header{width:100%;display:flex;align-items:center;gap:8px;padding:12px;border:none;background:none;font-size:13px;color:var(--text);text-align:right;}
  .sale-detail{padding:0 14px 12px;border-top:1px dashed var(--border);}
  .receipt-row{display:flex;justify-content:space-between;padding:2px 0;}

  .customer-card{padding:14px;display:flex;flex-direction:column;gap:8px;}
  .customer-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .customer-name{font-weight:700;font-family:'Tajawal',sans-serif;font-size:14.5px;}
  .customer-phone{color:var(--muted);font-size:11.5px;}
  .customer-due{color:var(--danger);font-weight:800;font-size:15px;font-family:'Tajawal',sans-serif;}

  .overlay{position:fixed;inset:0;background:rgba(20,20,15,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal{background:var(--surface);border-radius:16px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);font-family:'Tajawal',sans-serif;font-weight:700;}
  .modal-close{border:none;background:none;color:var(--muted);}
  .modal-body{padding:16px;display:flex;flex-direction:column;gap:4px;}
  .form-label{font-size:12px;color:var(--muted);margin-top:8px;margin-bottom:4px;display:block;}
  .form-input{width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;color:var(--text);}
  .form-row{display:flex;gap:10px;}
  .form-row>div{flex:1;}
  .code-row{display:flex;gap:8px;align-items:center;}
  .code-row .form-input{flex:1;}
  .pay-choice-row{display:flex;gap:10px;margin-top:6px;}
  .pay-choice{flex:1;padding:16px 10px;border-radius:12px;border:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:700;color:var(--text);}
  .pay-choice:hover{border-color:var(--primary);}
  .change-line{margin-top:10px;font-size:14px;color:var(--primary);background:#eef3ee;padding:8px 10px;border-radius:8px;}
  .due-line{margin-top:10px;font-size:14px;color:var(--danger);background:#fdecdf;padding:8px 10px;border-radius:8px;}
  .back-link{border:none;background:none;color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:4px;margin-bottom:6px;}

  .receipt-paper{font-family:monospace;font-size:12.5px;background:#fdfcf8;border:1px dashed var(--border);border-radius:8px;padding:14px;}
  .receipt-store-name{text-align:center;font-weight:700;font-family:'Tajawal',sans-serif;font-size:15px;margin-bottom:4px;}
  .receipt-meta{text-align:center;color:var(--muted);font-size:11px;margin-bottom:8px;}
  .receipt-divider{border-top:1px dashed var(--border);margin:8px 0;}
  .receipt-footer{text-align:center;margin-top:10px;color:var(--muted);font-size:11px;}

  .scan-wrap{display:flex;flex-direction:column;gap:10px;align-items:stretch;}
  .scan-reader{width:100%;border-radius:12px;overflow:hidden;background:#000;min-height:220px;}
  .scan-status{text-align:center;font-size:12.5px;color:var(--muted);}
  .barcode-preview{width:100%;margin-top:6px;background:#fff;border-radius:6px;padding:4px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:100;}
  .loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-family:'Tajawal',sans-serif;}
</style>
</head>
<body>
<div id="app"><div class="loading-screen">جارِ الاتصال بقاعدة البيانات...</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, getDocs, setDoc, deleteDoc,
  onSnapshot, runTransaction, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPGACuy_mqeb8tXTOuvSHRwMqMNcxhbgY",
  authDomain: "cashair-15366.firebaseapp.com",
  projectId: "cashair-15366",
  storageBucket: "cashair-15366.firebasestorage.app",
  messagingSenderId: "212519175835",
  appId: "1:212519175835:web:aa176b49d282fffce8e83e"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const productsCol = collection(db, 'products');
const salesCol = collection(db, 'sales');

/* ---------- Icons ---------- */
const ICONS = {
  search:'<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',
  camera:'<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
  minus:'<line x1="5" y1="12" x2="19" y2="12"></line>',
  trash:'<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>',
  x:'<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>',
  check:'<polyline points="20 6 9 17 4 12"></polyline>',
  cart:'<circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>',
  package:'<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>',
  chart:'<line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>',
  chevron:'<polyline points="9 18 15 12 9 6"></polyline>',
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>',
  save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline>',
  reset:'<polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>',
  printer:'<polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect>',
};
function icon(name, size){ size=size||16; return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`; }

/* ---------- Sample data ---------- */
const SAMPLE_PRODUCTS = [
  { id:'p1', name:'أرز أبيض 1 كجم', code:'1001', price:38, stock:40, unit:'كيس', category:'بقالة' },
  { id:'p2', name:'سكر 1 كجم', code:'1002', price:32, stock:35, unit:'كيس', category:'بقالة' },
  { id:'p3', name:'زيت عباد شمس 1 لتر', code:'1003', price:65, stock:20, unit:'زجاجة', category:'بقالة' },
  { id:'p4', name:'لبن جهينة 1 لتر', code:'1004', price:45, stock:15, unit:'كرتونة', category:'ألبان' },
  { id:'p5', name:'جبنة بيضاء 500 جم', code:'1005', price:55, stock:12, unit:'علبة', category:'ألبان' },
  { id:'p6', name:'خبز فينو', code:'1006', price:5, stock:60, unit:'كيس', category:'مخبوزات' },
  { id:'p7', name:'بيض (طبق 30)', code:'1007', price:110, stock:10, unit:'طبق', category:'بقالة' },
  { id:'p8', name:'شاي ليبتون 100 كيس', code:'1008', price:85, stock:18, unit:'علبة', category:'مشروبات' },
  { id:'p9', name:'بن تركي 250 جم', code:'1009', price:70, stock:4, unit:'علبة', category:'مشروبات' },
  { id:'p10', name:'معجون طماطم 400 جم', code:'1010', price:18, stock:3, unit:'علبة', category:'بقالة' },
  { id:'p11', name:'مياه معدنية 1.5 لتر', code:'1011', price:10, stock:50, unit:'زجاجة', category:'مشروبات' },
  { id:'p12', name:'مسحوق غسيل 1 كجم', code:'1012', price:60, stock:22, unit:'كيس', category:'منظفات' },
];

/* ---------- State ---------- */
let products = null, sales = null, cart = [];
let view = 'cashier';
let search = '', category = 'الكل';
let modalView = null;
let productForm = null, editingProductId = null;
let checkoutType = null;
let cashReceivedVal = '', creditCustomerName = '', creditCustomerPhone = '', creditDeposit = '';
let lastReceipt = null;
let settlingKey = null, settleAmount = '';
let toastMsg = null, toastType = 'ok';
let currentScanner = null;
let saving = false;
let connected = false;

const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const fmt = (n) => (Math.round((n||0)*100)/100).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});

function showToast(msg,type){
  toastType = type||'ok'; toastMsg = msg;
  rerender();
  setTimeout(()=>{ toastMsg=null; rerender(); }, 2400);
}

/* ---------- Firestore realtime wiring ---------- */
async function seedIfEmpty(){
  const snap = await getDocs(productsCol);
  if(snap.empty){
    for(const p of SAMPLE_PRODUCTS){
      await setDoc(doc(db,'products',p.id), {name:p.name,code:p.code,price:p.price,stock:p.stock,unit:p.unit,category:p.category});
    }
  }
}
function startListeners(){
  onSnapshot(productsCol, (snap)=>{
    connected = true;
    products = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    rerender();
  }, ()=>{ connected=false; rerender(); });
  onSnapshot(salesCol, (snap)=>{
    connected = true;
    sales = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    sales.sort((a,b)=> new Date(b.date) - new Date(a.date));
    rerender();
  }, ()=>{ connected=false; rerender(); });
}
async function boot(){
  startListeners();
}

/* ---------- Cart logic ---------- */
function addToCart(product){
  if(product.stock<=0){ showToast('المنتج غير متوفر بالمخزون','err'); return; }
  const existing = cart.find(i=>i.id===product.id);
  if(existing){
    if(existing.qty>=product.stock){ showToast('الكمية بالمخزون غير كافية','err'); return; }
    existing.qty++;
  } else {
    cart.push({id:product.id,name:product.name,price:product.price,unit:product.unit,qty:1});
  }
  rerender();
}
function changeQty(id,delta){
  const item = cart.find(i=>i.id===id);
  const prod = products.find(p=>p.id===id);
  if(!item) return;
  const next = item.qty+delta;
  if(next<=0) return;
  if(prod && next>prod.stock){ showToast('الكمية بالمخزون غير كافية','err'); return; }
  item.qty = next; rerender();
}
function removeFromCart(id){ cart = cart.filter(i=>i.id!==id); rerender(); }
function clearCart(){ cart = []; rerender(); }
function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }
function cartCount(){ return cart.reduce((s,i)=>s+i.qty,0); }

/* ---------- Checkout (atomic via Firestore transaction) ---------- */
function openCheckout(){
  if(cart.length===0) return;
  checkoutType=null; cashReceivedVal=''; creditCustomerName=''; creditCustomerPhone=''; creditDeposit='';
  modalView='checkout'; rerender();
}
async function runCheckoutTransaction(saleData){
  const saleId = genId();
  await runTransaction(db, async (tx)=>{
    const refs = cart.map(item=>doc(db,'products',item.id));
    const snaps = await Promise.all(refs.map(r=>tx.get(r)));
    for(let i=0;i<cart.length;i++){
      const data = snaps[i].data();
      if(!data || data.stock < cart[i].qty){
        const err = new Error('OUT_OF_STOCK'); err.productName = cart[i].name; throw err;
      }
    }
    for(let i=0;i<cart.length;i++){
      tx.update(refs[i], { stock: snaps[i].data().stock - cart[i].qty });
    }
    tx.set(doc(db,'sales',saleId), saleData);
  });
  return { id: saleId, ...saleData };
}
async function confirmCashCheckout(){
  const total = cartTotal();
  const paid = parseFloat(cashReceivedVal);
  if(isNaN(paid)||paid<total){ showToast('المبلغ المدفوع غير كافٍ','err'); return; }
  saving=true; rerender();
  const saleData = { date:new Date().toISOString(), items:cart, total, type:'cash', paid, change:paid-total, amountPaid:total, payments:[] };
  try{
    const sale = await runCheckoutTransaction(saleData);
    saving=false; lastReceipt=sale; modalView='receipt'; cart=[];
    showToast('تم إتمام عملية البيع','ok');
  }catch(e){
    saving=false;
    showToast(e.productName?('الكمية غير كافية لـ: '+e.productName):'تعذر إتمام عملية البيع','err');
    rerender();
  }
}
async function confirmCreditCheckout(){
  const total = cartTotal();
  if(!creditCustomerName.trim()){ showToast('اسم العميل مطلوب','err'); return; }
  let deposit = parseFloat(creditDeposit); if(isNaN(deposit)) deposit=0;
  if(deposit<0||deposit>total){ showToast('المبلغ المدفوع مقدمًا غير صحيح','err'); return; }
  saving=true; rerender();
  const saleData = {
    date:new Date().toISOString(), items:cart, total, type:'credit',
    customerName:creditCustomerName.trim(), customerPhone:creditCustomerPhone.trim(),
    amountPaid:deposit, payments: deposit>0?[{date:new Date().toISOString(),amount:deposit}]:[]
  };
  try{
    const sale = await runCheckoutTransaction(saleData);
    saving=false; lastReceipt=sale; modalView='receipt'; cart=[];
    showToast('تم تسجيل عملية بيع بالآجل','ok');
  }catch(e){
    saving=false;
    showToast(e.productName?('الكمية غير كافية لـ: '+e.productName):'تعذر إتمام عملية البيع','err');
    rerender();
  }
}

/* ---------- Credit / customers ---------- */
function getCustomerDebts(){
  const map = {};
  sales.filter(s=>s.type==='credit').forEach(s=>{
    const remaining = s.total - (s.amountPaid||0);
    const key = s.customerName+'|'+(s.customerPhone||'');
    if(!map[key]) map[key] = { key, name:s.customerName, phone:s.customerPhone, due:0, saleIds:[] };
    if(remaining>0.009){ map[key].due += remaining; map[key].saleIds.push(s.id); }
  });
  return Object.values(map).filter(c=>c.due>0.009).sort((a,b)=>b.due-a.due);
}
function openSettle(key){ settlingKey=key; settleAmount=''; modalView='settle'; rerender(); }
async function confirmSettle(){
  const amt = parseFloat(settleAmount);
  if(isNaN(amt)||amt<=0){ showToast('أدخل مبلغًا صحيحًا','err'); return; }
  const [name,phone] = settlingKey.split('|');
  let left = amt;
  const targets = sales.filter(s=>s.type==='credit' && s.customerName===name && (s.customerPhone||'')===phone && (s.total-(s.amountPaid||0))>0.009);
  try{
    for(const s of targets){
      if(left<=0) break;
      const remaining = s.total-(s.amountPaid||0);
      const applied = Math.min(remaining,left);
      left -= applied;
      await updateDoc(doc(db,'sales',s.id), {
        amountPaid: (s.amountPaid||0)+applied,
        payments: [...(s.payments||[]), {date:new Date().toISOString(), amount:applied}]
      });
    }
    modalView=null; settlingKey=null;
    showToast('تم تسجيل الدفعة','ok');
  }catch(e){ showToast('تعذر تسجيل الدفعة','err'); }
}

/* ---------- Scanner ---------- */
function startScanner(divId, onSuccess){
  if(typeof Html5Qrcode==='undefined'){ const el=document.getElementById('scan-status'); if(el) el.textContent='تعذر تحميل مكتبة المسح، أدخل الكود يدويًا.'; return; }
  stopScanner();
  let formats;
  try{
    formats=[Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.QR_CODE];
  }catch(e){ formats=undefined; }
  currentScanner = new Html5Qrcode(divId, formats?{formatsToSupport:formats,verbose:false}:undefined);
  currentScanner.start(
    { facingMode:'environment' },
    { fps:10, qrbox:{width:260,height:160} },
    (decodedText)=>{ onSuccess(decodedText); },
    ()=>{}
  ).catch(()=>{
    const el=document.getElementById('scan-status');
    if(el) el.textContent='تعذّر تشغيل الكاميرا. تحقق من إذن الوصول، أو أدخل الكود يدويًا.';
  });
}
function stopScanner(){
  if(currentScanner){
    const s = currentScanner; currentScanner=null;
    try{ s.stop().then(()=>{ try{s.clear();}catch(e){} }).catch(()=>{}); }catch(e){}
  }
}
function onProductScanSuccess(text){
  stopScanner();
  productForm.code = text; productForm.scanActive=false;
  showToast('تم قراءة الباركود','ok');
  rerender();
}
function manualEntryClick(){ stopScanner(); productForm.scanActive=false; rerender(); }
function restartScanClick(){ productForm.scanActive=true; rerender(); startScanner('reader', onProductScanSuccess); }

function openCartScan(){ modalView='cart-scan'; rerender(); startScanner('cart-reader', onCartScanSuccess); }
function onCartScanSuccess(text){
  stopScanner();
  const p = products.find(x=>x.code===text);
  modalView=null;
  if(p) addToCart(p); else { showToast('لم يتم العثور على منتج بهذا الكود: '+text,'err'); rerender(); }
}
function closeCartScan(){ stopScanner(); modalView=null; rerender(); }

/* ---------- Helpers ---------- */
function getCategories(){
  if(!products) return ['الكل'];
  return ['الكل', ...Array.from(new Set(products.map(p=>p.category)))];
}
function getFilteredProducts(){
  if(!products) return [];
  return products.filter(p=>{
    const matchCat = category==='الكل' || p.category===category;
    const q = search.trim().toLowerCase();
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.code.includes(q);
    return matchCat && matchSearch;
  });
}
function getTodayStats(){
  if(!sales) return {count:0,total:0};
  const today = new Date().toDateString();
  const list = sales.filter(s=>new Date(s.date).toDateString()===today);
  return { count:list.length, total:list.reduce((s,x)=>s+x.total,0) };
}

/* ---------- Input handling ---------- */
function onInput(el){
  const id=el.id, v=el.value;
  if(id==='search-input') search=v;
  else if(id==='form-name') productForm.name=v;
  else if(id==='form-code') productForm.code=v;
  else if(id==='form-price') productForm.price=v;
  else if(id==='form-stock') productForm.stock=v;
  else if(id==='form-unit') productForm.unit=v;
  else if(id==='form-category') productForm.category=v;
  else if(id==='cash-input') cashReceivedVal=v;
  else if(id==='credit-name') creditCustomerName=v;
  else if(id==='credit-phone') creditCustomerPhone=v;
  else if(id==='credit-deposit') creditDeposit=v;
  else if(id==='settle-amount') settleAmount=v;
  rerender();
}
function onSearchKeydown(e){
  if(e.key!=='Enter') return;
  const q = search.trim(); if(!q) return;
  const exact = products.find(p=>p.code===q);
  if(exact){ addToCart(exact); search=''; }
}
window.onInput = onInput;
window.onSearchKeydown = onSearchKeydown;

/* ---------- Click delegation ---------- */
document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action, id = el.dataset.id;
  switch(action){
    case 'nav': view=el.dataset.view; rerender(); break;
    case 'set-category': category=el.dataset.cat; rerender(); break;
    case 'add-to-cart': { const p=products.find(x=>x.id===id); if(p) addToCart(p); break; }
    case 'inc-qty': changeQty(id,1); break;
    case 'dec-qty': changeQty(id,-1); break;
    case 'remove-cart-item': removeFromCart(id); break;
    case 'clear-cart': clearCart(); break;
    case 'open-cart-scan': openCartScan(); break;
    case 'close-cart-scan': closeCartScan(); break;
    case 'open-checkout': openCheckout(); break;
    case 'choose-cash': checkoutType='cash'; rerender(); break;
    case 'choose-credit': checkoutType='credit'; rerender(); break;
    case 'back-checkout': checkoutType=null; rerender(); break;
    case 'confirm-cash': confirmCashCheckout(); break;
    case 'confirm-credit': confirmCreditCheckout(); break;
    case 'close-modal': stopScanner(); modalView=null; productForm=null; editingProductId=null; rerender(); break;
    case 'close-receipt': lastReceipt=null; modalView=null; rerender(); break;
    case 'add-product-click': openAddProduct(); break;
    case 'edit-product': openEditProduct(id); break;
    case 'delete-product': deleteProductHandler(id); break;
    case 'save-product': saveProductHandler(); break;
    case 'manual-entry': manualEntryClick(); break;
    case 'restart-scan': restartScanClick(); break;
    case 'open-reset': modalView='confirm-reset'; rerender(); break;
    case 'do-reset': resetData(); break;
    case 'cancel-reset': modalView=null; rerender(); break;
    case 'toggle-sale': { el.parentElement.classList.toggle('open-sale'); const d=el.parentElement.querySelector('.sale-detail-slot'); if(d) d.style.display = d.style.display==='block'?'none':'block'; break; }
    case 'settle-customer': openSettle(el.dataset.key); break;
    case 'confirm-settle': confirmSettle(); break;
    case 'cancel-settle': modalView=null; settlingKey=null; rerender(); break;
  }
});

/* ---------- Render ---------- */
function rerender(){
  const active=document.activeElement;
  const activeId = active&&active.id;
  const selStart = active&&active.selectionStart, selEnd = active&&active.selectionEnd;
  document.getElementById('app').innerHTML = renderApp();
  attachBarcodePreview();
  if(activeId){
    const el=document.getElementById(activeId);
    if(el){ el.focus(); if(selStart!=null&&el.setSelectionRange){ try{el.setSelectionRange(selStart,selEnd);}catch(e){} } }
  }
}
function attachBarcodePreview(){
  const svg=document.getElementById('barcode-svg');
  if(svg && productForm && productForm.code){
    try{ JsBarcode(svg, productForm.code, {format:'CODE128', width:1.6, height:40, displayValue:true, fontSize:12, margin:4}); }
    catch(e){}
  }
}

function renderProductFormModal(){
  const pf = productForm;
  return `
  <div class="overlay">
    <div class="modal">
      <div class="modal-header"><span>${editingProductId?'تعديل منتج':'إضافة منتج جديد'}</span>
        <button class="modal-close" data-action="close-modal">${icon('x',18)}</button></div>
      <div class="modal-body">
        ${pf.scanActive?`
          <div class="scan-wrap">
            <div id="reader" class="scan-reader"></div>
            <div id="scan-status" class="scan-status">وجّه الكاميرا نحو الباركود...</div>
            <button class="btn secondary" data-action="manual-entry">إدخال الكود يدويًا بدلًا من المسح</button>
          </div>
        `:`
          <label class="form-label">الكود / الباركود</label>
          <div class="code-row">
            <input id="form-code" class="form-input" value="${escAttr(pf.code)}" oninput="onInput(this)" placeholder="سيتم توليده تلقائيًا إن ترك فارغًا">
            <button class="cam-btn" data-action="restart-scan" title="مسح بالكاميرا">${icon('camera',16)}</button>
          </div>
          ${pf.code?`<svg id="barcode-svg" class="barcode-preview"></svg>`:''}
          <label class="form-label">اسم المنتج</label>
          <input id="form-name" class="form-input" value="${escAttr(pf.name)}" oninput="onInput(this)">
          <div class="form-row">
            <div><label class="form-label">السعر (ج.م)</label><input id="form-price" type="number" class="form-input" value="${escAttr(pf.price)}" oninput="onInput(this)"></div>
            <div><label class="form-label">الكمية بالمخزون</label><input id="form-stock" type="number" class="form-input" value="${escAttr(pf.stock)}" oninput="onInput(this)"></div>
          </div>
          <div class="form-row">
            <div><label class="form-label">الوحدة</label><input id="form-unit" class="form-input" value="${escAttr(pf.unit)}" oninput="onInput(this)"></div>
            <div><label class="form-label">الفئة</label><input id="form-category" class="form-input" value="${escAttr(pf.category)}" oninput="onInput(this)"></div>
          </div>
          <button class="btn primary" data-action="save-product">${icon('save',14)} حفظ</button>
        `}
      </div>
    </div>
  </div>`;
}

function renderCheckoutModal(){
  const total = cartTotal();
  let body='';
  if(checkoutType===null){
    body = `
      <div>الإجمالي المطلوب: <b>${fmt(total)} ج.م</b></div>
      <div class="pay-choice-row">
        <button class="pay-choice" data-action="choose-cash">${icon('receipt',20)} دفع نقدي</button>
        <button class="pay-choice" data-action="choose-credit">${icon('users',20)} بيع بالآجل</button>
      </div>`;
  } else if(checkoutType==='cash'){
    body = `
      <button class="back-link" data-action="back-checkout">${icon('chevron',14)} رجوع</button>
      <div>الإجمالي المطلوب: <b>${fmt(total)} ج.م</b></div>
      <label class="form-label">المبلغ المدفوع من العميل</label>
      <input id="cash-input" type="number" class="form-input" value="${escAttr(cashReceivedVal)}" oninput="onInput(this)" placeholder="0.00" autofocus>
      ${cashReceivedVal && !isNaN(parseFloat(cashReceivedVal)) ? `<div class="change-line">الباقي للعميل: <b>${fmt(Math.max(0,parseFloat(cashReceivedVal)-total))} ج.م</b></div>` : ''}
      <button class="btn primary" data-action="confirm-cash" ${saving?'disabled':''}>${saving?'جارِ الحفظ...':'تأكيد الدفع وطباعة الفاتورة'}</button>`;
  } else if(checkoutType==='credit'){
    const deposit = parseFloat(creditDeposit)||0;
    body = `
      <button class="back-link" data-action="back-checkout">${icon('chevron',14)} رجوع</button>
      <div>الإجمالي المطلوب: <b>${fmt(total)} ج.م</b></div>
      <label class="form-label">اسم العميل</label>
      <input id="credit-name" class="form-input" value="${escAttr(creditCustomerName)}" oninput="onInput(this)" placeholder="اسم العميل" autofocus>
      <label class="form-label">رقم الهاتف (اختياري)</label>
      <input id="credit-phone" class="form-input" value="${escAttr(creditCustomerPhone)}" oninput="onInput(this)" placeholder="01xxxxxxxxx">
      <label class="form-label">مبلغ مدفوع مقدمًا (اختياري)</label>
      <input id="credit-deposit" type="number" class="form-input" value="${escAttr(creditDeposit)}" oninput="onInput(this)" placeholder="0.00">
      <div class="due-line">المتبقي كآجل: <b>${fmt(Math.max(0,total-deposit))} ج.م</b></div>
      <button class="btn primary" data-action="confirm-credit" ${saving?'disabled':''}>${saving?'جارِ الحفظ...':'تأكيد البيع بالآجل'}</button>`;
  }
  return `
  <div class="overlay">
    <div class="modal">
      <div class="modal-header"><span>إتمام عملية البيع</span><button class="modal-close" data-action="close-modal">${icon('x',18)}</button></div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}

function renderReceiptModal(){
  const s = lastReceipt;
  const d = new Date(s.date);
  const isCredit = s.type==='credit';
  const remaining = s.total-(s.amountPaid||0);
  return `
  <div class="overlay">
    <div class="modal">
      <div class="modal-header"><span>الفاتورة</span><button class="modal-close" data-action="close-receipt">${icon('x',18)}</button></div>
      <div class="modal-body">
        <div class="receipt-paper">
          <div class="receipt-store-name">كاشير السوبر ماركت</div>
          <div class="receipt-meta">${d.toLocaleDateString('ar-EG')} — ${d.toLocaleTimeString('ar-EG')}</div>
          ${isCredit?`<div class="receipt-meta">عميل: ${s.customerName}${s.customerPhone?' · '+s.customerPhone:''}</div>`:''}
          <div class="receipt-divider"></div>
          ${s.items.map(i=>`<div class="receipt-row"><span>${i.name} × ${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
          <div class="receipt-divider"></div>
          <div class="receipt-row" style="font-weight:700"><span>الإجمالي</span><span>${fmt(s.total)} ج.م</span></div>
          ${isCredit?`
            <div class="receipt-row"><span>مدفوع مقدمًا</span><span>${fmt(s.amountPaid)} ج.م</span></div>
            <div class="receipt-row" style="font-weight:700"><span>متبقي (آجل)</span><span>${fmt(remaining)} ج.م</span></div>
          `:`
            <div class="receipt-row"><span>المدفوع</span><span>${fmt(s.paid)} ج.م</span></div>
            <div class="receipt-row"><span>الباقي</span><span>${fmt(s.change)} ج.م</span></div>
          `}
          <div class="receipt-footer">شكرًا لتعاملكم معنا</div>
        </div>
        <button class="btn primary" data-action="close-receipt">${icon('printer',14)} تم</button>
      </div>
    </div>
  </div>`;
}

function renderConfirmResetModal(){
  return `
  <div class="overlay">
    <div class="modal">
      <div class="modal-header"><span>إعادة ضبط البيانات</span><button class="modal-close" data-action="cancel-reset">${icon('x',18)}</button></div>
      <div class="modal-body">
        <p style="line-height:1.7">سيتم حذف كل المنتجات والمبيعات الحالية واستبدالها ببيانات تجريبية. هذا الإجراء لا يمكن التراجع عنه.</p>
        <div style="display:flex;gap:10px;margin-top:10px">
          <button class="btn danger" style="flex:1" data-action="do-reset">تأكيد الإعادة</button>
          <button class="btn secondary" style="flex:1" data-action="cancel-reset">إلغاء</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderSettleModal(){
  const [name] = (settlingKey||'').split('|');
  return `
  <div class="overlay">
    <div class="modal">
      <div class="modal-header"><span>تسجيل دفعة — ${name}</span><button class="modal-close" data-action="cancel-settle">${icon('x',18)}</button></div>
      <div class="modal-body">
        <label class="form-label">المبلغ المدفوع</label>
        <input id="settle-amount" type="number" class="form-input" value="${escAttr(settleAmount)}" oninput="onInput(this)" placeholder="0.00" autofocus>
        <button class="btn primary" data-action="confirm-settle">${icon('check',14)} تأكيد الدفعة</button>
      </div>
    </div>
  </div>`;
}

function renderCartScanModal(){
  return `
  <div class="overlay">
    <div class="modal">
      <div class="modal-header"><span>مسح باركود للإضافة إلى السلة</span><button class="modal-close" data-action="close-cart-scan">${icon('x',18)}</button></div>
      <div class="modal-body">
        <div class="scan-wrap">
          <div id="cart-reader" class="scan-reader"></div>
          <div id="scan-status" class="scan-status">وجّه الكاميرا نحو الباركود...</div>
        </div>
      </div>
    </div>
  </div>`;
}

function escAttr(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

boot();
</script>
</body>
</html>
